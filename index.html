<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roomify - 旅館空房管理平台</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Navigation -->
    <header class="navbar">
        <div class="logo">
            <i class="fa-solid fa-hotel"></i>
            <span>Roomify</span>
        </div>
        
        <div class="mode-toggle">
            <button id="guest-mode-btn" class="active"><i class="fa-solid fa-user"></i> 旅客搜尋前台</button>
            <button id="admin-mode-btn"><i class="fa-solid fa-user-gear"></i> 旅館管理後台</button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="container">

        <!-- Search Bar (Guest Mode View) -->
        <section id="guest-search-section" class="search-card">
            <div class="search-group">
                <label><i class="fa-regular fa-calendar-days"></i> 入住日期</label>
                <input type="date" id="checkin-date">
            </div>
            <div class="search-group">
                <label><i class="fa-regular fa-calendar-xmark"></i> 退房日期</label>
                <input type="date" id="checkout-date">
            </div>
            <div class="search-group">
                <label><i class="fa-solid fa-bed"></i> 房型選取</label>
                <select id="type-filter">
                    <option value="all">所有房型</option>
                    <option value="single">單人房</option>
                    <option value="double">雙人房</option>
                    <option value="suite">景觀套房</option>
                    <option value="family">家庭四人房</option>
                </select>
            </div>
            <button id="search-btn" class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i> 搜尋空房</button>
        </section>

        <!-- Admin Control Header (Admin Mode View) -->
        <section id="admin-control-section" class="admin-panel hidden">
            <div class="admin-info">
                <h2><i class="fa-solid fa-sliders"></i> 客房管理面板</h2>
                <p>輕鬆調整客房狀態、價格或新增房型</p>
            </div>
            <button id="add-room-btn" class="btn btn-accent"><i class="fa-solid fa-plus"></i> 新增房間</button>
        </section>

        <!-- Room Grid -->
        <section class="room-section">
            <div class="section-header">
                <h3><i class="fa-solid fa-list-check"></i> 客房列表與即時狀態</h3>
                <div class="status-legend">
                    <span class="legend available"><i class="fa-solid fa-circle"></i> 可預訂</span>
                    <span class="legend booked"><i class="fa-solid fa-circle"></i> 已預訂</span>
                    <span class="legend maintenance"><i class="fa-solid fa-circle"></i> 清潔/維護中</span>
                </div>
            </div>

            <div id="room-grid" class="room-grid">
                <!-- 由 script.js 動態渲染房間卡片 -->
            </div>
        </section>

    </main>

    <!-- Booking Modal -->
    <div id="booking-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="close-booking-modal">&times;</span>
            <h3 id="modal-room-title">預訂房間</h3>
            <form id="booking-form">
                <input type="hidden" id="modal-room-id">
                <div class="form-group">
                    <label>訂房人姓名</label>
                    <input type="text" id="guest-name" placeholder="例如：張小明" required>
                </div>
                <div class="form-group">
                    <label>聯絡電話</label>
                    <input type="tel" id="guest-phone" placeholder="0912-345-678" required>
                </div>
                <div class="form-group">
                    <label>電子郵件</label>
                    <input type="email" id="guest-email" placeholder="example@email.com" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">確認送出預訂</button>
            </form>
        </div>
    </div>

    <!-- Add Room Modal -->
    <div id="add-room-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="close-add-modal">&times;</span>
            <h3>新增房間</h3>
            <form id="add-room-form">
                <div class="form-group">
                    <label>房號</label>
                    <input type="text" id="new-room-number" placeholder="例如：105" required>
                </div>
                <div class="form-group">
                    <label>房型</label>
                    <select id="new-room-type">
                        <option value="single">單人房</option>
                        <option value="double" selected>雙人房</option>
                        <option value="suite">景觀套房</option>
                        <option value="family">家庭四人房</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>每晚價格 (NT$)</label>
                    <input type="number" id="new-room-price" placeholder="2500" min="500" required>
                </div>
                <div class="form-group">
                    <label>圖片網址 (URL)</label>
                    <input type="url" id="new-room-image" placeholder="https://images.unsplash.com/..." required>
                </div>
                <button type="submit" class="btn btn-accent btn-full">儲存並建立客房</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
